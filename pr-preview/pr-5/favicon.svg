<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#1e293b"/>
  <!-- rising bar chart: 4 bars of increasing height anchored to baseline y=28 -->
  <rect x="3"  y="20" width="5" height="8" rx="1" fill="#a78bfa"/>
  <rect x="10" y="15" width="5" height="13" rx="1" fill="#a78bfa"/>
  <rect x="17" y="9"  width="5" height="19" rx="1" fill="#a78bfa"/>
  <rect x="24" y="4"  width="5" height="24" rx="1" fill="#c4b5fd"/>
  <!-- trend line over the bars -->
  <polyline
    points="5.5,19 12.5,14 19.5,8 26.5,3"
    stroke="#ffffff" stroke-width="1.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>