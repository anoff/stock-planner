name: PR Preview – Web App

on:
  pull_request:
    paths:
      - "web/**"

permissions:
  contents: write
  pull-requests: write
  deployments: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    environment:
      name: pr-preview-${{ github.event.number }}
      url: https://anoff.github.io/stock-planner/pr-preview/pr-${{ github.event.number }}/
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_BASE_PATH: /pr-preview/pr-${{ github.event.number }}/
          VITE_CORS_PROXY: ${{ secrets.VITE_CORS_PROXY }}

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: web/dist
